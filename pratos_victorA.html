<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratos de comida</title>
</head>

<body>
    <h1>O que gostaria de comer?</h1>
    <script>
        let resposta = prompt("O que você gostaria de comer? Pizza/Hamburger/Sushi/Salada ")
        let pedido = resposta;


        switch (pedido) {

            case "Pizza":
                document.write("Pizza.");
                break;

            case "Hamburger":
                document.write("Hamburger");
                break;

            case "Sushi":
                document.write = ("Sushi");
                break;

            case "Salada":
                document.write("Salada");
                break;

            default:
                document.write("Prato não encontrado")
        }



    </script>
</body>

</html>
